name: Build

on: [push, pull_request]

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [22.x, 24.x]
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
            - name: Install dependencies
              run: npm ci
            - name: Vitest
              uses: Forsakringskassan/vitest-config@v2.5.0
            - name: Build
              run: npm run --if-present build

    vite:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                vite-version: [5.x, 6.x, 7.x, 8.x]
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - name: Use Node.js 22.x
              uses: actions/setup-node@v6
              with:
                  node-version: 22.x
            - name: Install dependencies
              run: npm ci
            - name: Build
              run: npm run --if-present build
            - name: Downgrade esbuild # older vite versions require esbuild 0.27
              run: npm install esbuild@0.27
            - name: Install Vite ${{ matrix.vite-version }}
              run: npm install --no-save $(npx -y npm-min-peer vite --major ${{ matrix.vite-version }} --with-name)
            - name: Testbed (commonjs)
              run: |
                  rm -rf testbed/dist
                  npm pkg -w testbed set type=commonjs
                  npm run -w testbed build
                  npm run -w testbed test
            - name: Testbed (esm)
              run: |
                  rm -rf testbed/dist
                  npm pkg -w testbed set type=module
                  npm run -w testbed build
                  npm run -w testbed test

    typescript:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                typescript-version: [5.x, 6.x]
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - name: Use Node.js 22.x
              uses: actions/setup-node@v6
              with:
                  node-version: 22.x
            - name: Install dependencies
              run: npm ci
            - name: Build
              run: npm run --if-present build
            - name: Install Typescript ${{ matrix.typescript-version }}
              run: npm install --no-save $(npx -y npm-min-peer typescript --major ${{ matrix.typescript-version }} --with-name)
            - name: Testbed
              run: |
                  npm pkg -w testbed set type=module
                  npm run -w testbed build
                  npm run -w testbed test

    testbed:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - name: Use Node.js 22.x
              uses: actions/setup-node@v6
              with:
                  node-version: 22.x
            - name: Install dependencies
              run: |
                  npm ci
            - name: Build
              run: npm run --if-present build
            - name: Testbed (commonjs)
              run: |
                  rm -rf testbed/dist
                  npm pkg -w testbed set type=commonjs
                  npm run -w testbed build
                  npm run -w testbed test
            - name: Testbed (esm)
              run: |
                  rm -rf testbed/dist
                  npm pkg -w testbed set type=module
                  npm run -w testbed build
                  npm run -w testbed test
